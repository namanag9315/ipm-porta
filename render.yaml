services:
  - type: web
    name: ipm-portal-api
    env: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn ipm_portal.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: GAS_BRIDGE_URL
        sync: false
      - key: GAS_BRIDGE_BASE_URL
        sync: false
      - key: TIMETABLE_SHEET_ID
        sync: false
      - key: ATTENDANCE_SHEET_ID
        sync: false
      - key: MESS_MENU_SHEET_ID
        sync: false
      - key: BIRTHDAY_SHEET_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: RECAPTCHA_SECRET_KEY
        sync: false
      - key: RECAPTCHA_REQUIRED
        value: "True"
      - key: RECAPTCHA_EXPECTED_ACTION
        value: student_login
      - key: RECAPTCHA_MIN_SCORE
        value: "0.5"
      - key: DEFAULT_BATCH_CODE
        sync: false
      - key: ONLY_BATCH_CODE
        sync: false
      - key: AUTO_SYNC_FALLBACK_ENABLED
        value: "False"
      - key: ATTENDANCE_CLEANUP_ENABLED
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
